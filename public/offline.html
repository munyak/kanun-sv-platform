<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2D6A4F" />
  <title>Offline — KaNun Monitoring</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #F7F8F8;
      color: #1D1D1F;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: #FFFFFF;
      border: 1px solid #E5E5E7;
      border-radius: 16px;
      padding: 40px 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }
    .mark {
      width: 64px; height: 64px;
      border-radius: 14px;
      background: #2D6A4F;
      color: #FFFFFF;
      font-weight: 700;
      font-size: 24px;
      display: inline-flex;
      align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.02em; }
    p  { color: #6E6E73; margin: 0 0 24px; line-height: 1.5; }
    button {
      font: inherit;
      border: 0;
      background: #2D6A4F;
      color: #FFFFFF;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #245a40; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">KW</div>
    <h1>You're offline</h1>
    <p>KaNun Monitoring needs an internet connection to load cases and visits. Reconnect and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
